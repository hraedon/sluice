apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: sluice
  namespace: sluice
  labels:
    app.kubernetes.io/name: sluice
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: sluice
  namespaceSelector:
    matchNames:
      - sluice
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      # /metrics is gated by SLUICE_ADMIN_TOKEN (deployment.yaml); the scrape
      # presents it as a Bearer token or Prometheus gets 401s and sluice goes
      # dark on the dashboards.
      authorization:
        type: Bearer
        credentials:
          name: sluice-secrets
          key: admin-token
