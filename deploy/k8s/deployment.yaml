apiVersion: apps/v1
kind: Deployment
metadata:
  name: sluice
  namespace: sluice
  labels:
    app.kubernetes.io/name: sluice
spec:
  replicas: 1
  strategy:
    # CRITICAL: Recreate, not RollingUpdate. Two sluice pods each hold their own
    # semaphore and reconciliation loop — the sum of their permits exceeds the
    # provider's concurrency limit, breaking the account-wide invariant sluice
    # exists to enforce. Never scale past 1.
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: sluice
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sluice
    spec:
      serviceAccountName: sluice
      enableServiceLinks: false
      terminationGracePeriodSeconds: 120
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
      containers:
        - name: sluice
          image: ghcr.io/hraedon/sluice:latest
          imagePullPolicy: IfNotPresent
          args:
            - serve
            - --upstream
            - https://api.code.umans.ai
            - --listen
            - 0.0.0.0:8800
            # Aim at the provider's full limit (4). The controller still backs
            # off automatically when observed concurrency or phantoms push into
            # the priority.low band, so this trades a 1-slot safety buffer for
            # using the 4th concurrent slot the plan pays for. Watch the
            # dashboard's queue_wait / band on the first days at 4.
            # (Temporarily 8→10 on 2026-07-03 for the WI-024 429 capture —
            # see docs/wi-024-429-capture-2026-07-03.md. Cost: a 5 h box.)
            - --target
            - "4"
            - --poll-interval
            - "5"
            - --release-cooldown
            - "2"
            - --queue-timeout
            - "30"
            - --usage-key-env
            - SLUICE_USAGE_KEY
            # Persist history to the sluice-data PVC so sparklines/forensics
            # survive image bumps (Recreate strategy restarts the pod on every
            # release). Default TTL (7 days) applies.
            - --history-store
            - /data/history.sqlite
          env:
            - name: SLUICE_USAGE_KEY
              valueFrom:
                secretKeyRef:
                  name: sluice-secrets
                  key: umans-api-key
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SLUICE_SINGLETON_GUARD
              value: kube-lease
            # Gates the admin routes (/, /status.json, /metrics, /history.json)
            # and enables the Plan 011 config-mutation endpoints (/admin/config).
            # Dashboard login = HTTP Basic, any username, token as password
            # (WI-008 resolved 2026-07-01: the dashboard's fetch rides the
            # browser-cached Basic auth). Prometheus scrapes carry the same
            # token via the ServiceMonitor `authorization` block. The proxy
            # routes are always auth-bound: clients present their own upstream
            # key.
            - name: SLUICE_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: sluice-secrets
                  key: admin-token
          ports:
            - name: http
              containerPort: 8800
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsUser: 1000
            runAsGroup: 1000
          volumeMounts:
            - mountPath: /tmp
              name: tmp
            - mountPath: /data
              name: data
      volumes:
        - emptyDir: {}
          name: tmp
        - name: data
          persistentVolumeClaim:
            claimName: sluice-data
