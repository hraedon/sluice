apiVersion: apps/v1
kind: Deployment
metadata:
  name: sluice
  namespace: sluice
  labels:
    app.kubernetes.io/name: sluice
spec:
  replicas: 1
  strategy:
    # CRITICAL: Recreate, not RollingUpdate. Two sluice pods each hold their own
    # semaphore and reconciliation loop — the sum of their permits exceeds the
    # provider's concurrency limit, breaking the account-wide invariant sluice
    # exists to enforce. Never scale past 1.
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: sluice
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sluice
    spec:
      serviceAccountName: sluice
      enableServiceLinks: false
      terminationGracePeriodSeconds: 120
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
      containers:
        - name: sluice
          image: ghcr.io/hraedon/sluice:latest
          imagePullPolicy: IfNotPresent
          args:
            - serve
            - --upstream
            - https://api.code.umans.ai
            - --listen
            - 0.0.0.0:8800
            # Aim at the provider's full limit (4). The controller still backs
            # off automatically when observed concurrency or phantoms push into
            # the priority.low band, so this trades a 1-slot safety buffer for
            # using the 4th concurrent slot the plan pays for. Watch the
            # dashboard's queue_wait / band on the first days at 4.
            - --target
            - "4"
            - --poll-interval
            - "5"
            - --release-cooldown
            - "2"
            - --queue-timeout
            - "30"
            - --usage-key-env
            - SLUICE_USAGE_KEY
          env:
            - name: SLUICE_USAGE_KEY
              valueFrom:
                secretKeyRef:
                  name: sluice-secrets
                  key: umans-api-key
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SLUICE_SINGLETON_GUARD
              value: kube-lease
            # --- External-exposure hardening (currently internal-only) ---------
            # Admin routes (/status.json, /metrics) are unauthenticated by
            # default — fine behind traefik-internal. BEFORE adding the external
            # ingress, gate them by setting an admin token here (and the matching
            # key in the secret). Caveat: the HTML dashboard at / fetches
            # /status.json from the browser with no token, so enabling this
            # blanks the live dashboard until token-in-browser auth exists
            # (tracked — see deploy/README.md). The proxy routes are always
            # auth-bound: clients must present their own upstream key.
            # - name: SLUICE_ADMIN_TOKEN
            #   valueFrom:
            #     secretKeyRef:
            #       name: sluice-secrets
            #       key: admin-token
          ports:
            - name: http
              containerPort: 8800
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsUser: 1000
            runAsGroup: 1000
          volumeMounts:
            - mountPath: /tmp
              name: tmp
      volumes:
        - emptyDir: {}
          name: tmp
