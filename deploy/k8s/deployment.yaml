apiVersion: apps/v1
kind: Deployment
metadata:
  name: sluice
  namespace: sluice
  labels:
    app.kubernetes.io/name: sluice
spec:
  replicas: 1
  strategy:
    # CRITICAL: Recreate, not RollingUpdate. Two sluice pods each hold their own
    # semaphore and reconciliation loop — the sum of their permits exceeds the
    # provider's concurrency limit, breaking the account-wide invariant sluice
    # exists to enforce. Never scale past 1.
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: sluice
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sluice
    spec:
      enableServiceLinks: false
      terminationGracePeriodSeconds: 120
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
      containers:
        - name: sluice
          image: ghcr.io/hraedon/sluice:latest
          imagePullPolicy: IfNotPresent
          args:
            - serve
            - --upstream
            - https://api.code.umans.ai
            - --listen
            - 0.0.0.0:8800
            - --target
            - "3"
            - --poll-interval
            - "5"
            - --release-cooldown
            - "2"
            - --queue-timeout
            - "30"
            - --usage-key-env
            - SLUICE_USAGE_KEY
          env:
            - name: SLUICE_USAGE_KEY
              valueFrom:
                secretKeyRef:
                  name: sluice-secrets
                  key: umans-api-key
          ports:
            - name: http
              containerPort: 8800
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsUser: 1000
            runAsGroup: 1000
          volumeMounts:
            - mountPath: /tmp
              name: tmp
      volumes:
        - emptyDir: {}
          name: tmp
