apiVersion: v1
kind: Secret
metadata:
  name: sluice-secrets
  namespace: sluice
type: Opaque
stringData:
  # WARNING: This is an EXAMPLE file. Replace the placeholder before applying.
  #
  # DO NOT commit real secrets to git. Create the secret with:
  #   kubectl create secret generic sluice-secrets \
  #     --namespace sluice \
  #     --from-literal=umans-api-key='sk-...' \
  #     --from-literal=admin-token="$(openssl rand -hex 32)"
  #
  # Both keys are required: the deployment consumes admin-token via
  # SLUICE_ADMIN_TOKEN (gates admin routes + enables dashboard config
  # mutations) and the ServiceMonitor presents it for /metrics scrapes.
  umans-api-key: "REPLACE-ME-UMANS-API-KEY"
  admin-token: "REPLACE-ME-ADMIN-TOKEN"
