name: ci
on:
  push:
    branches: [main]
  pull_request:
  # Weekly cron keeps pip-audit live even when the repo is settled (no
  # pushes). Also surfaces bit-rot early (setup-uv/node20 deprecations
  # that have bitten the whole family's CI).
  schedule:
    - cron: "0 6 * * 1"  # Monday 06:00 UTC

jobs:
  identifier-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      # No-op until the repository secret SLUICE_FORBIDDEN_IDENTIFIERS is
      # configured; the script exits 0 when the env var is unset (AGENTS.md:
      # no work-domain identifiers in committed files).
      - name: Check for committed work-domain identifiers
        env:
          SLUICE_FORBIDDEN_IDENTIFIERS: ${{ secrets.SLUICE_FORBIDDEN_IDENTIFIERS }}
        run: python scripts/check_committed_identifiers.py

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # AGENTS.md rule 6: async/streaming is easy to get locally-green and
        # actually-broken, so gate on all supported interpreters.
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
      # setup-uv@v8 no longer auto-creates a project venv (v5 did), so create
      # one explicitly — the steps below invoke tools via `.venv/bin/...`.
      - run: uv venv
      - run: uv pip install -e ".[dev]"
      - name: pip-audit
        run: |
          # Audit the third-party dependency closure. Snapshot it before
          # installing pip-audit (so the tool's own deps aren't included) and
          # drop sluice itself — it's an unpublished editable install that
          # --strict would otherwise fail on ("not found on PyPI").
          uv pip freeze | grep -v 'sluice' > /tmp/audit-reqs.txt
          uv pip install pip-audit
          .venv/bin/pip-audit --strict --requirement /tmp/audit-reqs.txt
      - name: ruff
        run: .venv/bin/ruff check .
      - name: mypy
        run: .venv/bin/mypy src
      - name: pytest
        run: .venv/bin/pytest -q
